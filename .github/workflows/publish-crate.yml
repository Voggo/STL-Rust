name: Prepare Rust Crate Release

# NOTE: This workflow intentionally does NOT publish yet.
# To enable real crates.io publishing, do ALL of the following:
# 1) Add repository secret: CARGO_REGISTRY_TOKEN (crates.io API token).
# 2) Replace the dry-run command for festl-macros with:
#    cargo publish --manifest-path festl/festl-macros/Cargo.toml --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
# 3) Add a propagation wait/retry step (sleep/poll) after publishing festl-macros.
# 4) Add an festl publish step after macros are visible on crates.io:
#    cargo publish --manifest-path festl/Cargo.toml --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
# 5) Keep publish order strictly: festl-macros first, then festl.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  validate-release:
    name: Validate crates for release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Dry-run festl-macros publish
        run: cargo publish --manifest-path festl/festl-macros/Cargo.toml --locked --dry-run

      - name: Validate festl crate metadata and buildability
        run: |
          cargo metadata --manifest-path festl/Cargo.toml --format-version 1 > /dev/null
          cargo check --manifest-path festl/Cargo.toml --locked
